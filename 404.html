<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Oort Technology</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0f1c;
    --ink-soft:#1a2236;
    --paper:#f7f8fb;
    --white:#ffffff;
    --mute:#5b667d;
    --line:#e3e7f0;
    --accent:#2b6cff;
    --accent-deep:#1746b8;
    --glow:#5fa8ff;
    --halo:rgba(43,108,255,.14);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:"Spline Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:var(--paper);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
  }
  h1,h2{font-family:"Sora",sans-serif;line-height:1.1;letter-spacing:-.02em}
  a{text-decoration:none;color:inherit}

  .brand{display:flex;align-items:center;gap:11px;font-family:"Sora";font-weight:700;font-size:19px;letter-spacing:-.02em}
  .logo{
    width:34px;height:34px;border-radius:9px;position:relative;
    background:radial-gradient(circle at 30% 30%,var(--glow),var(--accent) 45%,var(--accent-deep));
    box-shadow:0 4px 14px var(--halo);
    flex-shrink:0;
  }
  .logo::after{
    content:"";position:absolute;inset:0;border-radius:9px;
    border:1.5px solid rgba(255,255,255,.45);
    -webkit-mask:radial-gradient(circle at 70% 70%,transparent 55%,#000 56%);
            mask:radial-gradient(circle at 70% 70%,transparent 55%,#000 56%);
  }

  header{padding:26px 28px}

  main{
    flex:1;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    padding:60px 28px;text-align:center;
  }
  .bg{position:absolute;inset:0;z-index:0;pointer-events:none}
  .orb{position:absolute;border-radius:50%;filter:blur(70px);opacity:.55}
  .orb1{width:520px;height:520px;top:-180px;right:-140px;background:radial-gradient(circle,var(--glow),transparent 70%)}
  .orb2{width:420px;height:420px;bottom:-200px;left:-160px;background:radial-gradient(circle,#b9d2ff,transparent 70%)}
  .grid-lines{
    position:absolute;inset:0;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:54px 54px;
    -webkit-mask:radial-gradient(ellipse 80% 60% at 50% 40%,#000,transparent 75%);
            mask:radial-gradient(ellipse 80% 60% at 50% 40%,#000,transparent 75%);
    opacity:.5;
  }
  .inner{position:relative;z-index:1;max-width:560px}
  .code{
    font-family:"Sora";font-weight:800;
    font-size:clamp(88px,18vw,168px);line-height:1;
    background:linear-gradient(120deg,var(--accent),var(--glow));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-bottom:18px;
  }
  .inner h1{font-size:clamp(26px,4vw,38px);font-weight:700;margin-bottom:16px}
  .inner p{color:var(--mute);font-size:clamp(16px,2.2vw,18px);max-width:440px;margin:0 auto 36px}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--accent);color:#fff;font-weight:600;font-size:16px;
    padding:14px 28px;border-radius:10px;
    box-shadow:0 6px 18px var(--halo);
    transition:transform .2s,box-shadow .2s,background .2s;
    font-family:"Sora";letter-spacing:-.01em;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px var(--halo);background:var(--accent-deep)}

  footer{padding:28px;text-align:center;border-top:1px solid var(--line)}
  footer span{font-size:13px;color:var(--mute)}
</style>
</head>
<body>
<header>
  <a class="brand" href="/"><span class="logo"></span>Oort<span style="color:var(--accent)">Technology</span></a>
</header>

<main>
  <div class="bg">
    <span class="orb orb1"></span>
    <span class="orb orb2"></span>
    <div class="grid-lines"></div>
  </div>
  <div class="inner">
    <div class="code">404</div>
    <h1>This page drifted off course</h1>
    <p>The page you're looking for doesn't exist or has moved. Let's get you back to solid ground.</p>
    <a class="btn" href="/">Back to homepage</a>
  </div>
</main>

<footer>
  <span>© 2026 OORT CLOUD TECHNOLOGY S.L. · NIF B87964946 · All rights reserved.</span>
</footer>
</body>
</html>
